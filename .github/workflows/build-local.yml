name: Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Build
        run: |
          mkdir -p build
          go build -o build/openlist-linux-amd64 -ldflags="-w -s" -tags=jsoniter .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openlist-linux-amd64
          path: build/openlist-linux-amd64
          retention-days: 1

  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Build Windows amd64
        run: |
          mkdir -p build
          go build -o build/openlist-windows-amd64.exe -ldflags="-w -s" -tags=jsoniter .

      - name: Build Windows 7
        run: |
          # Get Go version
          go_version=$(go version | grep -o 'go[0-9]\+\.[0-9]\+\.[0-9]\+' | sed 's/go//')
          echo "Detected Go version: $go_version"

          # Download patched Go for Win7
          curl -fsSL --retry 3 -o go-win7.zip "https://github.com/XTLS/go-win7/releases/download/patched-${go_version}/go-for-win7-linux-amd64.zip"

          rm -rf go-win7
          unzip -q go-win7.zip -d go-win7
          rm go-win7.zip

          # Build for both architectures
          for arch in "amd64" "386"; do
            echo "Building for windows7-${arch}"
            export GOOS=windows
            export GOARCH=${arch}
            export CGO_ENABLED=1
            $(pwd)/go-win7/bin/go build -o build/openlist-windows7-${arch}.exe -ldflags="-w -s" -tags="jsoniter,sqlite_cgo_compat" .
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openlist-windows
          path: build/openlist-windows*.exe
          retention-days: 1